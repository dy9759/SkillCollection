# WPS 深度搜索 Skill 评估测试

[trigger_keywords]
# 测试触发关键词
"深度搜索 会议纪要" = { expects_skill = "wps-deep-search", description = "使用'深度搜索'触发词" }
"帮我深挖张总相关的信息" = { expects_skill = "wps-deep-search", description = "使用'深挖'触发词" }
"关联查询 ABC项目" = { expects_skill = "wps-deep-search", description = "使用'关联查询'触发词" }
"全面梳理前端架构相关内容" = { expects_skill = "wps-deep-search", description = "使用'全面梳理'触发词" }

[should_not_trigger]
# 不应触发此 skill 的查询
"搜索会议纪要" = { expects_skill = null, description = "简单搜索应使用 MCP 工具" }
"找一下关于 AI 的笔记" = { expects_skill = null, description = "普通查询应使用 MCP 工具" }
"帮我找 Vibe Coding 相关的笔记" = { expects_skill = null, description = "普通查询应使用 MCP 工具" }

[intent_parsing]
# 测试意图解析能力
"深度搜索上周的会议纪要" = {
  expects_skill = "wps-deep-search",
  checks = ["extract_time", "extract_keywords"],
  description = "时间维度提取"
}
"深挖 #工作 标签下的项目文档" = {
  expects_skill = "wps-deep-search",
  checks = ["extract_tags", "extract_keywords"],
  description = "标签维度提取"
}
"关联查询 Q3规划 的所有相关内容" = {
  expects_skill = "wps-deep-search",
  checks = ["divergent_search", "cross_note_relation"],
  description = "发散搜索"
}
"全面梳理我所有的待办事项" = {
  expects_skill = "wps-deep-search",
  checks = ["task_aggregation", "multi_keyword_search"],
  description = "任务聚合"
}

[scenarios]
# 场景化测试
"深度搜索：张总" = {
  expects_skill = "wps-deep-search",
  scenario = "人物信息查询",
  expected_dimensions = ["联系方式", "近期沟通", "参与项目", "个人偏好"]
}
"帮我深挖 Q3规划的进展" = {
  expects_skill = "wps-deep-search",
  scenario = "项目信息查询",
  expected_dimensions = ["目标", "里程碑", "资源需求", "风险点", "周报"]
}
"全面梳理前端性能优化相关内容" = {
  expects_skill = "wps-deep-search",
  scenario = "技术主题查询",
  expected_dimensions = ["技术方案", "实施记录", "相关会议", "最佳实践"]
}
